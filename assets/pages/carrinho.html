<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Carrinho - Hytale War Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/index.css" />
  </head>
  <body class="bg-[#050810] text-white font-sans">
    <nav
      class="w-full bg-slate-900/80 backdrop-blur-lg border-b border-yellow-600/20 py-4 px-6 flex justify-between items-center"
    >
      <div class="flex items-center gap-3">
        <img src="/img/logo-oficial.webp" alt="Logo" class="h-10" />
        <span class="font-fantasy text-yellow-500 uppercase tracking-tighter"
          >Hytale War</span
        >
      </div>
      <a
        href="/index.html"
        class="text-gray-400 hover:text-white text-xs uppercase font-bold transition"
      >
        <i class="fas fa-shopping-bag mr-2"></i> Continuar Comprando
      </a>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
      <h1
        class="font-fantasy text-3xl text-white uppercase mb-8 flex items-center gap-3"
      >
        <i class="fas fa-shopping-cart text-yellow-500"></i> Seu Carrinho
      </h1>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div id="cart-items-container" class="lg:col-span-2 space-y-4"></div>

        <div class="lg:col-span-1">
          <div
            class="bg-slate-900 border border-yellow-600/20 p-8 rounded-2xl shadow-2xl"
          >
            <h2 class="text-lg font-fantasy text-white uppercase mb-6">
              Total do Carrinho
            </h2>

            <div class="space-y-3 mb-8 border-b border-white/5 pb-6">
              <div class="flex justify-between text-sm text-gray-400">
                <span>Subtotal</span>
                <span id="subtotal-valor">R$ 0,00</span>
              </div>
              <div
                class="flex justify-between text-xl font-bold text-yellow-500 pt-4"
              >
                <span>Total</span>
                <span id="total-valor">R$ 0,00</span>
              </div>
            </div>

            <div class="space-y-4">
              <button
                onclick="window.location.href = '/assets/pages/checkout.html'"
                class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-4 rounded-xl uppercase text-xs tracking-widest transition-all"
              >
                Prosseguir para o Checkout
                <i class="fas fa-chevron-right ml-2"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="/assets/js/carrinho.js"></script>
    <script src="/assets/js/main.js"></script>
  </body>
</html>
